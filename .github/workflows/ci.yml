name: CI

on:
  pull_request:
  push:
    branches: [master]

# A PR gets one review-worthy result, not one per intermediate push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: compile (ninja-msvc, Debug)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The vcpkg preset resolves its toolchain through $env{VCPKG_ROOT}; the runner
      # image ships vcpkg but exports it as VCPKG_INSTALLATION_ROOT.
      - name: Point VCPKG_ROOT at the preinstalled vcpkg
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null

      # Without this every run rebuilds slang, ktx, sdl3 and the rest from source.
      # vcpkg.json carries the builtin-baseline, so hashing it keys the whole dep set.
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-

      # Compile only: the ninja-msvc-debug preset has BUILD_TESTS=ON, so the suites are
      # built but never run -- they need a GPU and a machine this runner isn't. Qt is
      # absent, so apps/editor is skipped (CMakeLists.txt find_package(Qt6 QUIET)).
      # build.py locates vcvars via vswhere when config.json is absent, as it is here.
      - name: Build
        run: python scripts/build.py --preset windows-ninja-msvc-dx12-debug

  compile-macos:
    name: compile (macos-clang, Debug)
    runs-on: macos-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # vcpkg's catch2 port calls vcpkg_fixup_pkgconfig on Unix, which fails outright without
      # pkg-config. Probed by binary rather than by formula name: `brew install pkg-config`
      # installs the `pkgconf` formula, so a formula-name check would miss it.
      - name: Install build tools
        run: |
          set -euo pipefail
          command -v ninja      >/dev/null || brew install ninja
          command -v pkg-config >/dev/null || brew install pkg-config

      # Unlike the Windows image, the macOS image is not guaranteed to ship vcpkg, so fall
      # back to a clone. It must NOT be shallow: vcpkg.json pins builtin-baseline, and a
      # --depth 1 clone would not contain that commit for vcpkg to resolve.
      - name: Point VCPKG_ROOT at vcpkg
        run: |
          set -euo pipefail
          if [ -n "${VCPKG_INSTALLATION_ROOT:-}" ] && [ -d "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          else
            git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
            echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          fi
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-arm64-osx-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-arm64-osx-

      # Compile only, as above. The macos-clang-debug preset leaves RENDERER_BACKEND unset,
      # so this builds core, assetlib, assetlib_cli, bgl_idlgen and bgl_objects -- the
      # backend-free RHI. bgl, gamelib, the editor and the examples are skipped until a
      # Metal backend exists. Assets stay as git-lfs pointers (checkout does not fetch them);
      # nothing here reads their contents.
      - name: Build
        run: python scripts/build.py --preset macos-clang-debug
